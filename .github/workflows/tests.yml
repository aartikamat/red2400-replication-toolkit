name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[figures,test]"

      - name: Run tests
        run: pytest -v --cov=red2400_toolkit --cov-report=term

      - name: Verify byte-identical audit (requires deposit)
        if: env.RED2400_DEPOSIT_DIR != ''
        env:
          RED2400_DEPOSIT_DIR: ${{ secrets.RED2400_DEPOSIT_DIR }}
        run: pytest -v -k byte_identical
